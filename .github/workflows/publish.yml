name: Publish to Modrinth

on:
  push:
    tags:
      - 'v*'                # 推送标签时触发
  release:
    types: [published]     # 已发布 Release 时也触发

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release from tag
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: "Automatically generated release for tag ${{ github.ref_name }}"
          draft: false
          prerelease: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "pMKJZtiq"
          name: Show My Item ${{ github.event.release.tag_name || github.ref_name }}
          version: ${{ github.event.release.tag_name || github.ref_name }}
          changelog: ${{ github.event.release.body || 'Release created from tag ${{ github.ref_name }}' }}
          loaders: |
            fabric
          game-versions: |
            1.21.4
          files: build/libs/showmyitem-*.jar