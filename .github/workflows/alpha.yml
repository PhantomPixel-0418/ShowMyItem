name: Publish Alpha

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Alpha 版本后缀 (例如: .1, .2, 或留空自动生成)'
        required: false
        default: ''
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version variables
        run: |
          # 基础版本号（可以读取 gradle.properties 或固定）
          BASE_VERSION="1.3.0"
          if [ -n "${{ inputs.version_suffix }}" ]; then
            ALPHA_VERSION="${BASE_VERSION}-alpha${{ inputs.version_suffix }}"
          else
            # 自动生成：使用日期 + 短 hash
            SHORT_HASH=${GITHUB_SHA:0:7}
            ALPHA_VERSION="${BASE_VERSION}-alpha.${SHORT_HASH}"
          fi
          echo "MOD_VERSION=$ALPHA_VERSION" >> $GITHUB_ENV
          echo "UNPREFIXED_TAG=v${ALPHA_VERSION}" >> $GITHUB_ENV
          echo "VERSION_TYPE=alpha" >> $GITHUB_ENV
          RELEASE_NAME="Show My Item v${ALPHA_VERSION} (Alpha)"
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

          DEFAULT_GAME_VERSION="1.21.5"
          MODRINTH_VERSION="${ALPHA_VERSION}+${DEFAULT_GAME_VERSION}fabric"
          echo "MODRINTH_VERSION=$MODRINTH_VERSION" >> $GITHUB_ENV
          echo "GAME_VERSIONS=$DEFAULT_GAME_VERSION" >> $GITHUB_ENV

          # 生成 alpha changelog
          cat << EOF > changelog.md
          > [!WARNING]
          > ⚠️ 这是一个 Alpha 测试版本

          **Version:** ${ALPHA_VERSION}
          **Commit:** ${GITHUB_SHA:0:7}
          **Build Time:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          此版本可能包含未完成的功能或 Bug，仅供测试。
          EOF

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew clean build

      - name: Find and prepare JAR
        run: |
          FINAL_JAR=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*.module.jar' | sort | head -n 1)
          if [ -z "$FINAL_JAR" ]; then
            echo "No final JAR found" >&2
            exit 1
          fi
          NEW_NAME="showmyitem-${MODRINTH_VERSION}.jar"
          cp "$FINAL_JAR" "build/libs/$NEW_NAME"
          echo "RELEASE_JAR=build/libs/$NEW_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.UNPREFIXED_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body_path: changelog.md
          draft: false
          prerelease: true
          files: ${{ env.RELEASE_JAR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "pMKJZtiq"
          name: ${{ env.RELEASE_NAME }}
          version: ${{ env.MODRINTH_VERSION }}
          version-type: ${{ env.VERSION_TYPE }}
          changelog-file: ${{ github.workspace }}/changelog.md
          loaders: fabric
          game-versions: ${{ env.GAME_VERSIONS }}
          files: ${{ env.RELEASE_JAR }}