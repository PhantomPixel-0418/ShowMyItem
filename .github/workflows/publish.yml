name: Publish to Modrinth

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'                # 推送标签时触发
  release:
    types: [published]     # 已发布 Release 时也触发

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.10

      - name: Build with Gradle
        run: gradle clean build

      - name: Create GitHub Release from tag and upload JAR
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automatically generated release for tag ${{ github.ref_name }}"
          files: build/libs/showmyitem-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR asset to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/showmyitem-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "pMKJZtiq"
          name: Show My Item ${{ github.event.release.tag_name || github.ref_name }}
          version: ${{ github.event.release.tag_name || github.ref_name }}
          changelog: ${{ github.event.release.body || format('Release created from tag {0}', github.ref_name) }}
          loaders: |
            fabric
          game-versions: |
            1.21.4
          files: build/libs/showmyitem-*.jar