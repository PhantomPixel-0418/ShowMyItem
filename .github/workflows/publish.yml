name: Publish to Modrinth

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'                # 推送标签时触发
  release:
    types: [published]     # 已发布 Release 时也触发

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Modrinth version variables from commit
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          DEFAULT_GAME_VERSIONS='1.21.4'
          GAME_VERSIONS=$(printf '%s\n' "$COMMIT_MSG" \
            | grep -iEo 'game-versions:[[:space:]]*.*' \
            | sed -E 's/^[Gg]ame-versions:[[:space:]]*//' \
            | tr ',' '\n' \
            | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
            | grep -v '^$')
          if [ -n "$GAME_VERSIONS" ]; then
            echo "Detected game versions from commit:"
            printf '%s\n' "$GAME_VERSIONS"
          else
            GAME_VERSIONS="$DEFAULT_GAME_VERSIONS"
            echo "Using default game version: $GAME_VERSIONS"
          fi
          PRIMARY_GAME_VERSION=$(printf '%s\n' "$GAME_VERSIONS" | head -n1 | tr -d '[:space:]')
          UNPREFIXED_TAG=${TAG_NAME#v}
          MODRINTH_VERSION="${UNPREFIXED_TAG}+${PRIMARY_GAME_VERSION}fabric"
          {
            printf 'GAME_VERSIONS<<EOF\n'
            printf '%s\n' "$GAME_VERSIONS"
            printf 'EOF\n'
          } >> $GITHUB_ENV
          echo "MODRINTH_VERSION=$MODRINTH_VERSION" >> $GITHUB_ENV
        shell: bash

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build with Gradle
        run: gradle clean build

      - name: Find built JAR
        run: |
          ROOT_JAR=$(find build/libs -maxdepth 1 -type f -name '*.jar' | head -n 1)
          if [ -z "$ROOT_JAR" ]; then
            echo "No JAR file found in build/libs" >&2
            exit 1
          fi
          NEW_NAME="showmyitem-${MODRINTH_VERSION}.jar"
          cp "$ROOT_JAR" "build/libs/$NEW_NAME"
          echo "RELEASE_JAR=build/libs/$NEW_NAME" >> $GITHUB_ENV
          ls -al build/libs
        shell: bash

      - name: Create GitHub Release from tag and upload JAR
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automatically generated release for tag ${{ github.ref_name }}"
          files: ${{ env.RELEASE_JAR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR asset to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.RELEASE_JAR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Modrinth
        if: github.event_name == 'push'
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "pMKJZtiq"
          name: Show My Item ${{ github.event.release.tag_name || github.ref_name }}
          version: ${{ env.MODRINTH_VERSION }}
          changelog: ${{ github.event.release.body || format('Release created from tag {0}', github.ref_name) }}
          loaders: fabric
          game-versions: ${{ env.GAME_VERSIONS }}
          files: ${{ env.RELEASE_JAR }}