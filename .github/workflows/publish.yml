name: Publish to Modrinth

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 获取完整历史以比较 tag

      - name: Set Modrinth version variables from commit
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          DEFAULT_GAME_VERSIONS='1.21.4'
          GAME_VERSIONS=$(printf '%s\n' "$COMMIT_MSG" \
            | grep -iEo 'game-versions:[[:space:]]*.*' \
            | sed -E 's/^[Gg]ame-versions:[[:space:]]*//' \
            | tr ',' '\n' \
            | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
            | grep -v '^$')
          if [ -n "$GAME_VERSIONS" ]; then
            echo "Detected game versions from commit:"
            printf '%s\n' "$GAME_VERSIONS"
          else
            GAME_VERSIONS="$DEFAULT_GAME_VERSIONS"
            echo "Using default game version: $GAME_VERSIONS"
          fi
          PRIMARY_GAME_VERSION=$(printf '%s\n' "$GAME_VERSIONS" | head -n1 | tr -d '[:space:]')
          UNPREFIXED_TAG=${TAG_NAME#v}
          MODRINTH_VERSION="${UNPREFIXED_TAG}+${PRIMARY_GAME_VERSION}fabric"
          {
            printf 'GAME_VERSIONS<<EOF\n'
            printf '%s\n' "$GAME_VERSIONS"
            printf 'EOF\n'
          } >> $GITHUB_ENV
          echo "MODRINTH_VERSION=$MODRINTH_VERSION" >> $GITHUB_ENV
        shell: bash

      - name: Generate changelog from commits
        run: |
          python3 << 'EOF'
          import os, subprocess, re
          from collections import defaultdict

          current_tag = os.environ['GITHUB_REF_NAME']
          try:
              prev_tag = subprocess.check_output(['git', 'describe', '--tags', '--abbrev=0', f'{current_tag}^'], stderr=subprocess.DEVNULL).decode().strip()
          except subprocess.CalledProcessError:
              prev_tag = None

          if prev_tag:
              commit_range = f"{prev_tag}..{current_tag}"
          else:
              commit_range = "HEAD"

          output = subprocess.check_output(['git', 'log', '--pretty=format:%s|%an|%H', commit_range]).decode().strip()
          commits = [line.split('|', 2) for line in output.split('\n')] if output else []

          categories = {
              'feat': ('✨ 新功能', []),
              'fix': ('🐛 Bug 修复', []),
              'docs': ('📝 文档', []),
              'style': ('💄 样式', []),
              'refactor': ('♻️ 重构', []),
              'perf': ('⚡ 性能优化', []),
              'test': ('✅ 测试', []),
              'chore': ('🔧 杂务', []),
              'build': ('📦 构建', []),
          }
          other = []

          repo = os.environ['GITHUB_REPOSITORY']
          repo_url = f"https://github.com/{repo}"

          for full_msg, author, hash_val in commits:
              msg = full_msg.strip()
              # 匹配类型，支持括号，例如 feat(ci): 或 fix:
              m = re.match(r'^([a-z]+)(?:\([^)]+\))?:\s*(.*)', msg)
              if m:
                  typ = m.group(1)
                  rest = m.group(2)
              else:
                  typ = None
                  rest = msg

              # 提取 PR/issue 引用 (例如 (#123))
              pr_match = re.search(r'\(#(\d+)\)$', rest)
              if pr_match:
                  pr = pr_match.group(1)
                  rest = re.sub(r'\s*\(#\d+\)$', '', rest)
              else:
                  pr = None

              entry = f"- {rest} by **@{author}**"
              if pr:
                  entry += f" in [#{pr}]({repo_url}/pull/{pr})"

              if typ and typ in categories:
                  categories[typ][1].append(entry)
              else:
                  other.append(entry)

          changelog = f"## Changes in {current_tag}\n\n"
          for typ, (title, entries) in categories.items():
              if entries:
                  changelog += f"### {title}\n" + "\n".join(entries) + "\n\n"
          if other:
              changelog += "### 📌 其他\n" + "\n".join(other) + "\n\n"
          if not changelog.strip():
              changelog = f"## Changes in {current_tag}\n\n- No changes recorded"

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"CHANGELOG<<EOF\n{changelog}\nEOF\n")
          EOF
        shell: bash

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew clean build

      - name: Find built JAR
        run: |
          ROOT_JAR=$(find build/libs -maxdepth 1 -type f -name '*.jar' | grep -vE '(-sources|-javadoc|\.module\.jar)$' | sort | head -n 1)
          if [ -z "$ROOT_JAR" ]; then
            echo "No JAR file found in build/libs" >&2
            exit 1
          fi
          echo "Selected JAR: $ROOT_JAR"
          jar tf "$ROOT_JAR" | sed -n '1,80p'
          NEW_NAME="showmyitem-${MODRINTH_VERSION}.jar"
          cp "$ROOT_JAR" "build/libs/$NEW_NAME"
          echo "RELEASE_JAR=build/libs/$NEW_NAME" >> $GITHUB_ENV
          ls -al build/libs
        shell: bash

      - name: Create GitHub Release from tag and upload JAR
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ env.CHANGELOG }}
          draft: false
          prerelease: false
          files: ${{ env.RELEASE_JAR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR asset to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.RELEASE_JAR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Modrinth
        if: github.event_name == 'push'
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "pMKJZtiq"
          name: Show My Item ${{ github.event.release.tag_name || github.ref_name }}
          version: ${{ env.MODRINTH_VERSION }}
          changelog: ${{ env.CHANGELOG }}
          loaders: fabric
          game-versions: ${{ env.GAME_VERSIONS }}
          files: ${{ env.RELEASE_JAR }}