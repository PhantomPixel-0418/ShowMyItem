name: Publish to Modrinth

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'
      - '.github/workflows/publish.yml'
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version variables
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" != "tag" ]]; then
            echo "IS_ALPHA=true" >> $GITHUB_ENV
            ALPHA_VERSION="1.0.0-alpha.${GITHUB_SHA:0:7}"
            echo "MODRINTH_VERSION=$ALPHA_VERSION" >> $GITHUB_ENV
            echo "VERSION_TYPE=alpha" >> $GITHUB_ENV
            echo "UNPREFIXED_TAG=$ALPHA_VERSION" >> $GITHUB_ENV
            echo "GAME_VERSIONS=1.21.4" >> $GITHUB_ENV
            
            # 生成简单的 alpha changelog
            cat << EOF > alpha_changelog.md
          > ![warning](https://img.shields.io/badge/Warning-Alpha%20Version-yellow)
          > ⚠️ 这是一个自动构建的 Alpha 测试版本

          **Commit:** ${GITHUB_SHA:0:7}
          **Commit Message:** $COMMIT_MSG
          **构建时间:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          此版本仅用于测试，可能包含未完成的功能。
          EOF
            echo "CHANGELOG_FILE=alpha_changelog.md" >> $GITHUB_ENV
          else
            echo "IS_ALPHA=false" >> $GITHUB_ENV
            
            # 解析游戏版本
            DEFAULT_GAME_VERSIONS='1.21.4'
            GAME_VERSIONS=$(printf '%s\n' "$COMMIT_MSG" \
              | grep -iEo 'game-versions:[[:space:]]*.*' \
              | sed -E 's/^[Gg]ame-versions:[[:space:]]*//' \
              | tr ',' '\n' \
              | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
              | grep -v '^$')
            if [ -z "$GAME_VERSIONS" ]; then
              GAME_VERSIONS="$DEFAULT_GAME_VERSIONS"
            fi
            PRIMARY_GAME_VERSION=$(printf '%s\n' "$GAME_VERSIONS" | head -n1 | tr -d '[:space:]')
            UNPREFIXED_TAG=${TAG_NAME#v}
            MODRINTH_VERSION="${UNPREFIXED_TAG}+${PRIMARY_GAME_VERSION}fabric"
            
            # 提取版本类型
            VERSION_TYPE="release"
            if [[ "$UNPREFIXED_TAG" == *-alpha* ]]; then
              VERSION_TYPE="alpha"
            elif [[ "$UNPREFIXED_TAG" == *-beta* ]]; then
              VERSION_TYPE="beta"
            fi
            
            {
              printf 'GAME_VERSIONS<<EOF\n'
              printf '%s\n' "$GAME_VERSIONS"
              printf 'EOF\n'
            } >> $GITHUB_ENV
            echo "MODRINTH_VERSION=$MODRINTH_VERSION" >> $GITHUB_ENV
            echo "VERSION_TYPE=$VERSION_TYPE" >> $GITHUB_ENV
            echo "UNPREFIXED_TAG=$UNPREFIXED_TAG" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Generate changelog from commits (stable only)
        if: env.IS_ALPHA == 'false'
        run: |
          python3 << 'EOF'
          import os, subprocess, re
          from collections import defaultdict

          current_tag = os.environ['GITHUB_REF_NAME']
          try:
              prev_tag = subprocess.check_output(['git', 'describe', '--tags', '--abbrev=0', f'{current_tag}^'], stderr=subprocess.DEVNULL).decode().strip()
          except subprocess.CalledProcessError:
              prev_tag = None

          if prev_tag:
              commit_range = f"{prev_tag}..{current_tag}"
          else:
              commit_range = "HEAD"

          output = subprocess.check_output(['git', 'log', '--pretty=format:%s|%an|%H', commit_range]).decode().strip()
          commits = [line.split('|', 2) for line in output.split('\n')] if output else []

          categories = {
              'feat': ('✨ 新功能', []),
              'fix': ('🐛 Bug 修复', []),
              'docs': ('📝 文档', []),
              'style': ('💄 样式', []),
              'refactor': ('♻️ 重构', []),
              'perf': ('⚡ 性能优化', []),
              'test': ('✅ 测试', []),
              'chore': ('🔧 杂务', []),
              'build': ('📦 构建', []),
          }
          other = []

          repo = os.environ['GITHUB_REPOSITORY']
          repo_url = f"https://github.com/{repo}"

          for full_msg, author, hash_val in commits:
              msg = full_msg.strip()
              m = re.match(r'^([a-z]+)(?:\([^)]+\))?:\s*(.*)', msg)
              if m:
                  typ = m.group(1)
                  rest = m.group(2)
              else:
                  typ = None
                  rest = msg

              pr_match = re.search(r'\(#(\d+)\)$', rest)
              if pr_match:
                  pr = pr_match.group(1)
                  rest = re.sub(r'\s*\(#\d+\)$', '', rest)
              else:
                  pr = None

              entry = f"- {rest} by **@{author}**"
              if pr:
                  entry += f" in [#{pr}]({repo_url}/pull/{pr})"

              if typ and typ in categories:
                  categories[typ][1].append(entry)
              else:
                  other.append(entry)

          changelog = f"## Changes in {current_tag}\n\n"
          for typ, (title, entries) in categories.items():
              if entries:
                  changelog += f"### {title}\n" + "\n".join(entries) + "\n\n"
          if other:
              changelog += "### 📌 其他\n" + "\n".join(other) + "\n\n"
          if not changelog.strip():
              changelog = f"## Changes in {current_tag}\n\n- No changes recorded"

          with open('stable_changelog.md', 'w') as f:
              f.write(changelog)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write("CHANGELOG_FILE=stable_changelog.md\n")
          EOF
        shell: bash

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew clean build

      - name: Find and prepare JAR
        run: |
          FINAL_JAR=$(find build/libs -maxdepth 1 -type f -name '*.jar' | grep -vE '(-sources|-javadoc|\.module\.jar)$' | sort | head -n 1)
          
          USE_DEV_JAR=false
          if [ -z "$FINAL_JAR" ]; then
            echo "No final JAR found, trying dev JAR..."
            USE_DEV_JAR=true
          else
            if command -v stat >/dev/null 2>&1; then
              JAR_SIZE=$(stat -c%s "$FINAL_JAR" 2>/dev/null || stat -f%z "$FINAL_JAR" 2>/dev/null)
            else
              JAR_SIZE=$(wc -c < "$FINAL_JAR" | tr -d ' ')
            fi
            if [ "$JAR_SIZE" -lt 1024 ]; then
              echo "Final JAR too small ($JAR_SIZE bytes), using dev JAR"
              USE_DEV_JAR=true
            else
              echo "Final JAR size OK ($JAR_SIZE bytes)"
            fi
          fi

          if [ "$USE_DEV_JAR" = "true" ]; then
            DEV_JAR=$(find build/devlibs -maxdepth 1 -type f -name '*.jar' | head -n 1)
            if [ -z "$DEV_JAR" ]; then
              echo "No dev.jar found" >&2
              exit 1
            fi
            ROOT_JAR="$DEV_JAR"
            echo "Using dev JAR: $ROOT_JAR"
          else
            ROOT_JAR="$FINAL_JAR"
            echo "Using final JAR: $ROOT_JAR"
          fi

          NEW_NAME="showmyitem-${MODRINTH_VERSION}.jar"
          cp "$ROOT_JAR" "build/libs/$NEW_NAME"
          echo "RELEASE_JAR=build/libs/$NEW_NAME" >> $GITHUB_ENV
          ls -al build/libs/
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.UNPREFIXED_TAG }}
          name: ${{ env.MODRINTH_VERSION }}
          body_path: ${{ env.CHANGELOG_FILE }}
          draft: false
          prerelease: ${{ env.IS_ALPHA == 'true' }}
          files: ${{ env.RELEASE_JAR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "pMKJZtiq"
          name: Show My Item ${{ env.MODRINTH_VERSION }}
          version: ${{ env.MODRINTH_VERSION }}
          version-type: ${{ env.VERSION_TYPE }}
          changelog-file: ${{ env.CHANGELOG_FILE }}
          loaders: fabric
          game-versions: ${{ env.GAME_VERSIONS }}
          files: ${{ env.RELEASE_JAR }}