name: Publish Beta

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Beta 版本后缀 (例如: .1, .2, 或留空自动生成)'
        required: false
        default: ''
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version variables
        run: |
          BASE_VERSION="1.3.0"
          if [ -n "${{ inputs.version_suffix }}" ]; then
            BETA_VERSION="${BASE_VERSION}-beta${{ inputs.version_suffix }}"
          else
            SHORT_HASH=${GITHUB_SHA:0:7}
            BETA_VERSION="${BASE_VERSION}-beta.${SHORT_HASH}"
          fi
          echo "MOD_VERSION=$BETA_VERSION" >> $GITHUB_ENV
          echo "UNPREFIXED_TAG=v${BETA_VERSION}" >> $GITHUB_ENV
          echo "VERSION_TYPE=beta" >> $GITHUB_ENV
          RELEASE_NAME="Show My Item v${BETA_VERSION} (Beta)"
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

          DEFAULT_GAME_VERSION="1.21.4"
          MODRINTH_VERSION="${BETA_VERSION}+${DEFAULT_GAME_VERSION}fabric"
          echo "MODRINTH_VERSION=$MODRINTH_VERSION" >> $GITHUB_ENV
          echo "GAME_VERSIONS=$DEFAULT_GAME_VERSION" >> $GITHUB_ENV

          cat << EOF > changelog.md
          > [!NOTE]
          > 🧪 这是一个 Beta 测试版本

          **Version:** ${BETA_VERSION}
          **Commit:** ${GITHUB_SHA:0:7}
          **Build Time:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          此版本已经过基本测试，但仍可能存在未发现的问题。
          EOF

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew clean build

      - name: Find and prepare JAR
        run: |
          FINAL_JAR=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*.module.jar' | sort | head -n 1)
          if [ -z "$FINAL_JAR" ]; then
            echo "No final JAR found" >&2
            exit 1
          fi
          NEW_NAME="showmyitem-${MODRINTH_VERSION}.jar"
          cp "$FINAL_JAR" "build/libs/$NEW_NAME"
          echo "RELEASE_JAR=build/libs/$NEW_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.UNPREFIXED_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body_path: changelog.md
          draft: false
          prerelease: true
          files: ${{ env.RELEASE_JAR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "pMKJZtiq"
          name: ${{ env.RELEASE_NAME }}
          version: ${{ env.MODRINTH_VERSION }}
          version-type: ${{ env.VERSION_TYPE }}
          changelog-file: ${{ github.workspace }}/changelog.md
          loaders: fabric
          game-versions: ${{ env.GAME_VERSIONS }}
          files: ${{ env.RELEASE_JAR }}